<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon.png">

    <title>HabitFlow</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --border-color: #222222;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 850px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px;}
        .header-text h1 { margin: 0; font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        .header-text p { margin: 5px 0 0 0; color: var(--text-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 2px; font-weight: 600;}

        /* Smooth SVG Progress Ring */
        .progress-ring-container {
            position: relative;
            width: 76px; height: 76px;
        }
        .progress-svg {
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }
        .progress-track {
            fill: none;
            stroke: var(--border-color);
            stroke-width: 6;
        }
        .progress-fill {
            fill: none;
            stroke: var(--accent);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 220;
            stroke-dashoffset: 220;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-inner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: var(--accent);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px; 
            padding: 20px;
            margin-bottom: 24px;
        }

        .form-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; min-width: 80px; }
        .input-group.full-width { min-width: 100%; }
        .input-group label { font-size: 10px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding-left: 4px; }
        
        input {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 14px 16px;
            border-radius: 14px; 
            font-weight: 600; font-size: 16px;
            outline: none; transition: all 0.3s ease;
            -webkit-appearance: none;
        }
        input:focus { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,255,255,0.15); }
        
        button { cursor: pointer; border: none; font-weight: bold; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-add { 
            background-color: #000000; color: #ffffff; 
            padding: 14px 24px; border-radius: 14px; border: 1px solid #333333;
            font-size: 14px; height: 48px; flex-grow: 1;
        }
        .btn-add:active { background-color: #333; transform: scale(0.96); }

        .btn-sync {
            width: 100%; margin-top: 20px; background-color: #1a1a1a; 
            color: var(--text-muted); border: 1px dashed #333333; 
            padding: 14px; border-radius: 14px; font-size: 11px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-sync:active { background-color: #222; transform: scale(0.98); }

        .habit-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid var(--border-color);
            gap: 10px;
        }
        .habit-item:last-child { border-bottom: none; padding-bottom: 0; }

        .habit-info { display: flex; align-items: center; gap: 12px; flex-grow: 1; }
        .bell-icon { font-size: 20px; background: none; padding: 10px; margin-left: -10px; }
        .bell-on { color: var(--accent); }
        .bell-off { color: #333333; }
        .habit-name { font-weight: 600; font-size: 16px; letter-spacing: -0.3px;}
        .habit-time { color: var(--text-muted); font-size: 12px; margin-top: 4px; font-weight: 500; }

        .streaks-wrapper {
            display: flex; gap: 16px; overflow-x: auto; padding-bottom: 5px;
            justify-content: flex-end; align-items: center;
            -webkit-overflow-scrolling: touch; 
        }
        .streaks-wrapper::-webkit-scrollbar { display: none; }

        .day-col { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 40px; }
        .day-label { font-size: 10px; color: var(--text-muted); text-align: center; line-height: 1.4; font-weight: 600;}
        .day-num { font-size: 14px; color: var(--text-main); font-weight: 700;}
        
        .fire-btn { 
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: none; padding: 0; outline: none; 
        }
        .dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid #333333;
            background-color: transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fire-btn.fire-lit .dot {
            background-color: var(--accent);
            border-color: var(--accent);
            transform: scale(1.4); 
        }
        
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-text">
            <h1>HabitFlow</h1>
            <p>Daily Progress</p>
        </div>
        
        <div class="progress-ring-container">
            <svg class="progress-svg" viewBox="0 0 100 100">
                <circle class="progress-track" cx="50" cy="50" r="35"></circle>
                <circle class="progress-fill" id="progress-line" cx="50" cy="50" r="35"></circle>
            </svg>
            <div class="progress-inner" id="progress-text">0%</div>
        </div>
    </div>

    <div class="card">
        <span style="color: var(--text-main); font-weight: 700; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;">+ New Habit</span>
        
        <div class="form-row">
            <div class="input-group full-width">
                <label>Habit Name</label>
                <input type="text" id="h-name" placeholder="e.g. Read 20 pages..." autocomplete="off">
            </div>
            <div class="input-group">
                <label>Start</label>
                <input type="time" id="h-start" value="09:00">
            </div>
            <div class="input-group">
                <label>Stop</label>
                <input type="time" id="h-end" value="10:00">
            </div>
            <div class="input-group">
                <label>Remind</label>
                <input type="time" id="h-notify" value="08:50">
            </div>
            <button class="btn-add" onclick="addHabit()">ADD</button>
        </div>
        
        <button class="btn-sync" onclick="syncToCalendar()">
            📅 Sync Reminders to iPhone Calendar
        </button>
    </div>

    <h3 style="margin-top: 30px; font-weight: 700; font-size: 12px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase;">Tracking</h3>
    <div class="card" id="habit-list"></div>
</div>

<script>
    let habits = JSON.parse(localStorage.getItem('habits')) || {};
    let notifiedToday = new Set();

    function getLocalDateStr(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function saveData() {
        localStorage.setItem('habits', JSON.stringify(habits));
        renderHabits();
        updateProgress();
    }

    function addHabit() {
        const nameInput = document.getElementById('h-name');
        const name = nameInput.value.trim();
        const start = document.getElementById('h-start').value;
        const end = document.getElementById('h-end').value;
        const notifyTime = document.getElementById('h-notify').value; 

        if (!name) { alert("Please enter a name for your habit."); nameInput.focus(); return; }
        if (habits[name]) { alert("You already have a habit with this exact name!"); return; }

        habits[name] = { startTime: start, endTime: end, notifyTime: notifyTime, history: {}, notify: true };
        nameInput.value = '';
        saveData();
    }

    function toggleBell(name) {
        habits[name].notify = !habits[name].notify;
        saveData();
    }

    function toggleDay(name, dateStr) {
        if (!habits[name].history) habits[name].history = {}; 
        
        if (habits[name].history[dateStr]) {
            delete habits[name].history[dateStr];
        } else {
            habits[name].history[dateStr] = true;
        }
        saveData();
    }

    function updateProgress() {
        const todayStr = getLocalDateStr(new Date()); 
        const habitKeys = Object.keys(habits);
        const progressLine = document.getElementById('progress-line');
        const progressText = document.getElementById('progress-text');
        
        const circumference = 220; 

        if (habitKeys.length === 0) {
            progressText.innerText = '0%';
            progressLine.style.strokeDashoffset = circumference;
            return;
        }

        let completed = 0;
        habitKeys.forEach(key => {
            if (habits[key].history && habits[key].history[todayStr]) completed++;
        });

        const pct = (completed / habitKeys.length);
        const displayPct = Math.round(pct * 100);
        
        progressText.innerText = `${displayPct}%`;
        
        const offset = circumference - (pct * circumference);
        progressLine.style.strokeDashoffset = offset;
    }

    function renderHabits() {
        const list = document.getElementById('habit-list');
        list.innerHTML = '';

        if (Object.keys(habits).length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#333; font-size: 14px; font-weight: 500;">No habits being tracked.</p>';
            return;
        }

        const today = new Date();

        for (const [name, data] of Object.entries(habits)) {
            const item = document.createElement('div');
            item.className = 'habit-item';

            const bellClass = data.notify ? 'bell-on' : 'bell-off';
            let timeLog = `${data.startTime} - ${data.endTime}`;
            if (data.notifyTime && data.notifyTime !== data.startTime) {
                timeLog += ` <span style="color: #555; font-size: 11px;">(🔔 ${data.notifyTime})</span>`;
            }

            let infoHTML = `
                <div class="habit-info">
                    <button class="bell-icon ${bellClass}" onclick="toggleBell(this.dataset.name)" data-name="${name}">🔔</button>
                    <div>
                        <div class="habit-name">${name}</div>
                        <div class="habit-time">${timeLog}</div>
                    </div>
                </div>
            `;

            let streaksHTML = `<div class="streaks-wrapper">`;
            for (let i = 14; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                
                const dateStr = getLocalDateStr(d); 
                const dayNum = d.getDate();
                const monthName = d.toLocaleDateString('en-US', { month: 'short' }).toUpperCase(); 
                
                const isLit = data.history ? data.history[dateStr] : false; 
                const fireClass = isLit ? 'fire-lit' : 'fire-dim';

                streaksHTML += `
                    <div class="day-col">
                        <span class="day-label">
                            <span class="day-num">${dayNum}</span><br>${monthName}
                        </span>
                        <button class="fire-btn ${fireClass}" onclick="toggleDay(this.dataset.name, '${dateStr}')" data-name="${name}">
                            <div class="dot"></div>
                        </button>
                    </div>
                `;
            }
            streaksHTML += `</div>`;

            item.innerHTML = infoHTML + streaksHTML;
            list.appendChild(item);
        }
        
        document.querySelectorAll('.streaks-wrapper').forEach(el => el.scrollLeft = el.scrollWidth);
    }

    function syncToCalendar() {
        let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//HabitFlow//EN\n";
        
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');

        for (const [name, data] of Object.entries(habits)) {
            if (!data.notify) continue;

            const targetTime = data.notifyTime || data.startTime;
            const [hours, minutes] = targetTime.split(':');
            
            const dtStart = `${year}${month}${day}T${hours}${minutes}00`;
            
            icsContent += "BEGIN:VEVENT\n";
            icsContent += `UID:${name.replace(/\s+/g, '')}@habitflow\n`;
            icsContent += `DTSTAMP:${dtStart}Z\n`;
            icsContent += `DTSTART;TZID=LocalTime:${dtStart}\n`;
            icsContent += "RRULE:FREQ=DAILY\n"; 
            icsContent += `SUMMARY:HabitFlow: ${name}\n`;
            icsContent += `DESCRIPTION:Time to start your habit: ${name}\n`;
            
            icsContent += "BEGIN:VALARM\n";
            icsContent += "TRIGGER:-PT0M\n"; 
            icsContent += "ACTION:DISPLAY\n";
            icsContent += `DESCRIPTION:Reminder for ${name}\n`;
            icsContent += "END:VALARM\n";
            
            icsContent += "END:VEVENT\n";
        }
        
        icsContent += "END:VCALENDAR";

        const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
        const link = document.createElement('a');
        link.href = window.URL.createObjectURL(blob);
        link.setAttribute('download', 'habitflow_reminders.ics');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Retained for desktop/active window alerts
    setInterval(() => {
        if (Notification.permission !== "granted") return;
        
        const now = new Date();
        const currentTime = now.toTimeString().slice(0, 5);
        const dateStr = getLocalDateStr(now);

        if (dateStr !== getLocalDateStr(new Date(Date.now() - 60000))) {
            renderHabits(); 
            updateProgress();
        }
        
        for (const [name, data] of Object.entries(habits)) {
            const notifyKey = `${name}_${dateStr}`;
            const targetTime = data.notifyTime || data.startTime;

            if (data.notify && targetTime === currentTime && !notifiedToday.has(notifyKey)) {
                new Notification("HabitFlow Reminder", {
                    body: `Upcoming: ${name} starts at ${data.startTime}`
                });
                notifiedToday.add(notifyKey);
            }
        }
    }, 30000); 

    if (Notification.permission !== "granted" && window.Notification) {
        Notification.requestPermission();
    }
    
    renderHabits();
    updateProgress();
</script>
</body>
</html>
